name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check frameguard/ tests/
      - run: mypy frameguard/ --ignore-missing-imports

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # run all versions even if one fails
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[pyspark,dev]"
      - run: pytest tests/pyspark/ -q --tb=short

  # Test against the newest Python release.
  # Allowed to fail — PySpark may not support it yet.
  test-latest:
    needs: lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -e ".[pyspark,dev]"
      - run: pytest tests/pyspark/ -q --tb=short
